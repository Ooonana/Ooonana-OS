name: Build Ooonana Packages

on:
  workflow_dispatch:
    inputs:
      packages:
        description: "Extra space-separated Alpine package names to import"
        required: false
        default: ""
      package_profile:
        description: "Repo package profile file to import"
        required: false
        default: "configs/packages/ooonana-repo.list"
      alpine_repo:
        description: "Space-separated Alpine APK repository URLs"
        required: true
        default: "https://dl-cdn.alpinelinux.org/alpine/v3.20/main/x86_64 https://dl-cdn.alpinelinux.org/alpine/v3.20/community/x86_64"
      release_tag:
        description: "GitHub Release tag for tarball backup"
        required: true
        default: "packages-latest"
      publish_pages:
        description: "Deploy generated package repo to GitHub Pages"
        required: true
        type: boolean
        default: false
      full_i3_profile:
        description: "Build Ooonana full-i3 wrapper packages and branding archive"
        required: true
        type: boolean
        default: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-packages:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build package repo
        env:
          PACKAGES: ${{ inputs.packages }}
          PACKAGE_PROFILE: ${{ inputs.package_profile }}
          ALPINE_REPOS: ${{ inputs.alpine_repo }}
        run: |
          set -euo pipefail
          out="$RUNNER_TEMP/ooonana-repo"
          mkdir -p "$out"
          repo_args=""
          for repo in $ALPINE_REPOS; do
            repo_args="$repo_args --repo-url $repo"
          done
          profile="$PACKAGE_PROFILE"
          if [ "${{ inputs.full_i3_profile }}" = "true" ] && [ "$profile" = "configs/packages/ooonana-repo.list" ]; then
            profile="configs/packages/full-i3.list"
          fi
          package_list=""
          if [ -n "$profile" ]; then
            if [ ! -f "$profile" ]; then
              echo "::error::missing package profile: $profile"
              exit 1
            fi
            package_list="$(sed -e 's/[[:space:]]*#.*$//' -e '/^[[:space:]]*$/d' "$profile" | tr '\n' ' ')"
          fi
          package_list="$package_list $PACKAGES"
          package_list="$(printf '%s\n' "$package_list" | tr ' ' '\n' | awk 'NF && !seen[$0]++ { print }' | tr '\n' ' ' | sed 's/[[:space:]]*$//')"
          if [ -z "$package_list" ]; then
            echo "::error::no packages requested; set packages or package_profile"
            exit 1
          fi
          if [ "${{ inputs.full_i3_profile }}" = "true" ]; then
            # shellcheck disable=SC2086
            bash scripts/import-i3-package-set.sh $repo_args --out-dir "$out" --packages "$package_list"
          else
            # shellcheck disable=SC2086
            bash scripts/import-apk-package.sh $repo_args --out-dir "$out" $package_list
          fi
          find "$out" -maxdepth 3 -type f -print | sort

      - name: Pack repo backup
        run: |
          set -euo pipefail
          tar -C "$RUNNER_TEMP/ooonana-repo" -czf "$RUNNER_TEMP/ooonana-package-repo.tar.gz" .

      - name: Upload package repo artifact
        uses: actions/upload-artifact@v4
        with:
          name: ooonana-package-repo
          path: ${{ runner.temp }}/ooonana-repo

      - name: Upload package repo tarball artifact
        uses: actions/upload-artifact@v4
        with:
          name: ooonana-package-repo-tarball
          path: ${{ runner.temp }}/ooonana-package-repo.tar.gz

      - name: Publish tarball to release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          if ! gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release create "$RELEASE_TAG" --title "Ooonana package repo" --notes "Generated Ooonana package repo backup."
          fi
          gh release upload "$RELEASE_TAG" "$RUNNER_TEMP/ooonana-package-repo.tar.gz" --clobber

      - name: Configure Pages
        if: ${{ inputs.publish_pages }}
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: ${{ inputs.publish_pages }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ runner.temp }}/ooonana-repo

      - name: Deploy Pages
        if: ${{ inputs.publish_pages }}
        uses: actions/deploy-pages@v4
