name: Build Ooonana Packages

on:
  workflow_dispatch:
    inputs:
      packages:
        description: "Extra space-separated Alpine package names to import"
        required: false
        default: ""
      package_profile:
        description: "Repo package profile file to import"
        required: false
        default: "configs/packages/full-i3.list"
      alpine_repo:
        description: "Space-separated Alpine APK repository URLs"
        required: true
        default: "https://dl-cdn.alpinelinux.org/alpine/v3.20/main/x86_64 https://dl-cdn.alpinelinux.org/alpine/v3.20/community/x86_64"
      release_tag:
        description: "GitHub Release tag for tarball backup"
        required: true
        default: "packages-latest"
      publish_pages:
        description: "Deploy generated package repo to GitHub Pages"
        required: true
        type: boolean
        default: false
      publish_r2:
        description: "Deploy generated package repo to Cloudflare R2"
        required: true
        type: boolean
        default: false
      r2_bucket:
        description: "Cloudflare R2 bucket name"
        required: false
        default: "ooonana-packages"
      r2_prefix:
        description: "Cloudflare R2 object prefix"
        required: false
        default: "packages-latest"
      r2_public_url:
        description: "Public HTTP URL for the R2 repo directory"
        required: false
        default: ""
      full_i3_profile:
        description: "Build Ooonana full-i3 wrapper packages and branding archive"
        required: true
        type: boolean
        default: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-packages:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build package repo
        env:
          PACKAGES: ${{ inputs.packages }}
          PACKAGE_PROFILE: ${{ inputs.package_profile }}
          ALPINE_REPOS: ${{ inputs.alpine_repo }}
          OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          OOONANA_REPO_SIGN_KEY_B64: ${{ secrets.OOONANA_REPO_SIGN_KEY_B64 }}
          OOONANA_REPO_PUBLIC_KEY_B64: ${{ secrets.OOONANA_REPO_PUBLIC_KEY_B64 }}
        run: |
          set -euo pipefail
          out="$RUNNER_TEMP/ooonana-repo"
          sign_args=""
          if [ -n "${OOONANA_REPO_SIGN_KEY_B64:-}" ]; then
            printf '%s' "$OOONANA_REPO_SIGN_KEY_B64" | base64 -d > "$RUNNER_TEMP/ooonana-repo-sign.key"
            chmod 600 "$RUNNER_TEMP/ooonana-repo-sign.key"
            sign_args="$sign_args --sign-key $RUNNER_TEMP/ooonana-repo-sign.key"
          fi
          if [ -n "${OOONANA_REPO_PUBLIC_KEY_B64:-}" ]; then
            printf '%s' "$OOONANA_REPO_PUBLIC_KEY_B64" | base64 -d > "$RUNNER_TEMP/ooonana-repo.pub"
            sign_args="$sign_args --public-key $RUNNER_TEMP/ooonana-repo.pub"
          fi
          repo_args=""
          for repo in $ALPINE_REPOS; do
            repo_args="$repo_args --repo-url $repo"
          done
          profile="$PACKAGE_PROFILE"
          if [ "${{ inputs.full_i3_profile }}" = "true" ] && [ "$profile" = "configs/packages/ooonana-cloud.list" ]; then
            profile="configs/packages/full-i3.list"
          fi
          full_i3_arg=""
          if [ "${{ inputs.full_i3_profile }}" = "true" ]; then
            full_i3_arg="--full-i3"
          fi
          pages_url="https://${OWNER}.github.io/${REPO_NAME}"
          release_url="https://github.com/${OWNER}/${REPO_NAME}/releases/download/${RELEASE_TAG}/ooonana-package-repo.tar.gz"
          cloud_url="$release_url"
          if [ "${{ inputs.publish_pages }}" = "true" ]; then
            cloud_url="$pages_url"
          fi
          r2_public_url="${{ inputs.r2_public_url }}"
          if [ "${{ inputs.publish_r2 }}" = "true" ] && [ -n "$r2_public_url" ]; then
            cloud_url="${r2_public_url%/}"
          fi
          # shellcheck disable=SC2086
          bash scripts/build-package-repo.sh \
            --out-dir "$out" \
            --package-profile "$profile" \
            --packages "$PACKAGES" \
            --cloud-url "$cloud_url" \
            --clean \
            $full_i3_arg \
            $sign_args \
            $repo_args
          find "$out" -maxdepth 3 -type f -print | sort

      - name: Pack repo backup
        run: |
          set -euo pipefail
          tar -C "$RUNNER_TEMP/ooonana-repo" -czf "$RUNNER_TEMP/ooonana-package-repo.tar.gz" .

      - name: Upload package repo artifact
        uses: actions/upload-artifact@v4
        with:
          name: ooonana-package-repo
          path: ${{ runner.temp }}/ooonana-repo

      - name: Upload package repo tarball artifact
        uses: actions/upload-artifact@v4
        with:
          name: ooonana-package-repo-tarball
          path: ${{ runner.temp }}/ooonana-package-repo.tar.gz

      - name: Publish tarball to release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          if ! gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release create "$RELEASE_TAG" --title "Ooonana package repo" --notes "Generated Ooonana package repo backup."
          fi
          gh release upload "$RELEASE_TAG" "$RUNNER_TEMP/ooonana-package-repo.tar.gz" --clobber

      - name: Install AWS CLI for R2
        if: ${{ inputs.publish_r2 }}
        run: |
          set -euo pipefail
          python3 -m pip install --user awscli

      - name: Publish direct repo to Cloudflare R2
        if: ${{ inputs.publish_r2 }}
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ inputs.r2_bucket }}
          R2_PREFIX: ${{ inputs.r2_prefix }}
          R2_PUBLIC_URL: ${{ inputs.r2_public_url }}
        run: |
          set -euo pipefail
          export PATH="$HOME/.local/bin:$PATH"
          bash scripts/publish-r2-repo.sh \
            --repo-dir "$RUNNER_TEMP/ooonana-repo" \
            --bucket "$R2_BUCKET" \
            --prefix "$R2_PREFIX" \
            --public-url "$R2_PUBLIC_URL"

      - name: Configure Pages
        if: ${{ inputs.publish_pages }}
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: ${{ inputs.publish_pages }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ runner.temp }}/ooonana-repo

      - name: Deploy Pages
        if: ${{ inputs.publish_pages }}
        uses: actions/deploy-pages@v4
