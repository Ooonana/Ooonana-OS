<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" role="img" aria-labelledby="title desc">
  <title id="title">Ooonana OS Wallpaper</title>
  <desc id="desc">Dark Ooonana OS wallpaper rendered from the project ASCII art.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#050505"/>
      <stop offset="0.64" stop-color="#111111"/>
      <stop offset="1" stop-color="#1d1207"/>
    </linearGradient>
  </defs>
  <rect id="ooonana-wallpaper" width="1920" height="1080" fill="url(#bg)"/>
  <rect x="0" y="918" width="1920" height="162" fill="#ffb21a" opacity="0.12"/>
  <g id="ooonana-face" fill="#ffb21a" font-family="monospace" font-size="72" font-weight="700" xml:space="preserve">
    <text class="ooonana-ascii" x="446" y="216">
      <tspan x="446" dy="0">Ooonana OS</tspan>
      <tspan x="446" dy="108">      __________________</tspan>
      <tspan x="446" dy="108">     |    __      __    |</tspan>
      <tspan x="446" dy="108">     |   /  \    /  \   |</tspan>
      <tspan x="446" dy="108">   / |                  |\</tspan>
      <tspan x="446" dy="108">  /  |     \______/     | \</tspan>
      <tspan x="446" dy="108">     |__________________|</tspan>
      <tspan x="446" dy="108">          |        |</tspan>
    </text>
  </g>
  <text x="960" y="1012" text-anchor="middle" fill="#ffd37a" font-family="monospace" font-size="32">full i3 edition</text>
</svg>
