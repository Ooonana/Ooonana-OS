<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" role="img" aria-labelledby="title desc">
  <title id="title">Ooonana OS Wallpaper</title>
  <desc id="desc">Default dark mode Ooonana OS wallpaper rendered from the project ASCII art.</desc>
  <rect id="ooonana-wallpaper" width="1920" height="1080" fill="#050505"/>
  <rect id="ooonana-horizon" x="0" y="912" width="1920" height="168" fill="#ffb21a" opacity="0.13"/>
  <rect x="0" y="906" width="1920" height="2" fill="#ffb21a" opacity="0.72"/>
  <g id="ooonana-face" fill="#ffb21a" font-family="monospace" font-size="72" font-weight="700" xml:space="preserve">
    <text class="ooonana-ascii" x="446" y="216">
      <tspan x="446" dy="0">Ooonana OS</tspan>
      <tspan x="446" dy="108">      __________________</tspan>
      <tspan x="446" dy="108">     |    __      __    |</tspan>
      <tspan x="446" dy="108">     |   /  \    /  \   |</tspan>
      <tspan x="446" dy="108">   / |                  |\</tspan>
      <tspan x="446" dy="108">  /  |     \______/     | \</tspan>
      <tspan x="446" dy="108">     |__________________|</tspan>
      <tspan x="446" dy="108">          |        |</tspan>
    </text>
  </g>
  <text x="960" y="1002" text-anchor="middle" fill="#ffd37a" font-family="monospace" font-size="32">full i3 edition</text>
  <text x="960" y="1044" text-anchor="middle" fill="#ffb21a" font-family="monospace" font-size="24">default dark mode</text>
</svg>
